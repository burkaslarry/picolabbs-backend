server:
  port: ${PORT:3001}

# Default local dev: PostgreSQL on localhost (see also profile "h2" for embedded H2).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aicrm_zomate_ai_crm_demo}
    username: ${SPRING_DATASOURCE_USERNAME:larrylo}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgresql.sql
  jackson:
    property-naming-strategy: SNAKE_CASE

logging:
  level:
    org.springframework.web: INFO

app:
  db:
    dialect: postgresql

# Prototype：POST /api/demo/seed-returning-customers 的 key；留空則用程式內預設（見 DemoSeedController）。
picolabbs:
  demo:
    returning-seed-key: ${PICOLABBS_DEMO_SEED_KEY:}
